name: Dev
'on':
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    branches:
    - main
    - backport/*
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      any_src_changed: ${{ steps.src.outputs.any_changed }}
      bendpy_changed: ${{ steps.bendpy.outputs.any_changed }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check Source File Changes
      uses: tj-actions/changed-files@v46
      id: src
      with:
        files_ignore: '.github/**

          **.md

          benchmark/**

          docker/**

          scripts/setup/**

          scripts/distribution/**

          .devcontainer/**

          '
    - name: Check Bendpy File Changes
      uses: tj-actions/changed-files@v46
      id: bendpy
      with:
        files: 'src/bendpy/**

          '
    - name: Output Source File Changes
      run: "if [[ \"${{ steps.src.outputs.any_changed }}\" == \"true\" ]]; then\n\
        \  echo \"these src files changed:\" >> $GITHUB_STEP_SUMMARY\n  for line in\
        \ ${{ steps.src.outputs.all_changed_files }}; do\n    echo \"- $line\" >>\
        \ $GITHUB_STEP_SUMMARY\n  done\nelse\n  echo \"no src file changes detected\"\
        \ >> $GITHUB_STEP_SUMMARY\nfi\n"
  linux:
    needs: changes
    if: needs.changes.outputs.any_src_changed == 'true'
    uses: ./.github/workflows/reuse.linux.yml
    secrets: inherit
    with:
      build_profile: ci
      runner_provider: aws
      runner_arch: ARM64
      license_type: trial
  mac_check:
    needs: changes
    if: needs.changes.outputs.any_src_changed == 'true'
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: ./.github/actions/check_macos
      timeout-minutes: 60
  test_bendpy:
    needs: changes
    if: needs.changes.outputs.bendpy_changed == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: ./.github/actions/build_bindings_python
      timeout-minutes: 30
      with:
        target: aarch64-unknown-linux-gnu
  ready:
    if: always()
    runs-on: ubuntu-latest
    needs:
    - changes
    - linux
    - mac_check
    - test_bendpy
    steps:
    - name: Check Ready to Merge
      uses: actions/github-script@v7
      env:
        SRC_CHANGED: ${{ needs.changes.outputs.any_src_changed }}
        BENDPY_CHANGED: ${{ needs.changes.outputs.bendpy_changed }}
        LINUX_BUILD_RESULT: ${{ needs.linux.result }}
        MAC_CHECK_RESULT: ${{ needs.mac_check.result }}
        BENDPY_RESULT: ${{ needs.test_bendpy.result }}
      with:
        script: "if (process.env.SRC_CHANGED == 'false' && process.env.BENDPY_CHANGED\
          \ == 'false') {\n  core.info('No source file changes detected, skipping');\n\
          \  return;\n}\nif (process.env.BENDPY_CHANGED == 'true' && process.env.BENDPY_RESULT\
          \ != 'success') {\n  core.setFailed(`Bendpy tests did not complete successfully\
          \ (${process.env.BENDPY_RESULT}), not ready to merge`);\n  return;\n}\n\
          if (process.env.SRC_CHANGED == 'false') {\n  core.info('Required bendpy\
          \ checks succeeded, ready to merge');\n  return;\n}\nif (process.env.MAC_CHECK_RESULT\
          \ != 'success') {\n  core.setFailed(`macOS check did not complete successfully\
          \ (${process.env.MAC_CHECK_RESULT}), not ready to merge`);\n  return;\n\
          }\nif (process.env.LINUX_BUILD_RESULT == 'success') {\n  core.info('Linux\
          \ build and macOS check succeeded, ready to merge');\n  return;\n}\ncore.setFailed('Build\
          \ failed, not ready to merge');\n"
