name: Merge Group
'on':
  merge_group: null
jobs:
  title:
    runs-on: ubuntu-latest
    steps:
    - name: Skip title check
      shell: bash
      run: exit 0
  cla:
    runs-on: ubuntu-latest
    steps:
    - name: Skip CLA check
      shell: bash
      run: exit 0
  changes:
    runs-on: ubuntu-latest
    outputs:
      any_src_changed: ${{ steps.src.outputs.any_changed }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check Source File Changes
      uses: tj-actions/changed-files@v46
      id: src
      with:
        files_ignore: '.github/**

          **.md

          benchmark/**

          docker/**

          scripts/setup/**

          .devcontainer/**

          '
    - name: Output Source File Changes
      run: "if [[ \"${{ steps.src.outputs.any_changed }}\" == \"true\" ]]; then\n\
        \  echo \"these src files changed:\" >> $GITHUB_STEP_SUMMARY\n  for line in\
        \ ${{ steps.src.outputs.all_changed_files }}; do\n    echo \"- $line\" >>\
        \ $GITHUB_STEP_SUMMARY\n  done\nelse\n  echo \"no src file changes detected\"\
        \ >> $GITHUB_STEP_SUMMARY\nfi\n"
  check:
    needs: changes
    if: needs.changes.outputs.any_src_changed == 'true'
    runs-on: ubuntu-latest
    env:
      RUNNER_PROVIDER: aws
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check
      uses: ./.github/actions/check
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
  ready:
    if: always()
    runs-on: ubuntu-latest
    needs:
    - changes
    - check
    steps:
    - name: Check Ready to Merge
      uses: actions/github-script@v7
      env:
        SRC_CHANGED: ${{ needs.changes.outputs.any_src_changed }}
        CHECK_RESULT: ${{ needs.check.result }}
      with:
        script: "if (process.env.SRC_CHANGED == 'false') {\n  core.info('No source\
          \ file changes detected, skipping');\n  return;\n}\nif (process.env.CHECK_RESULT\
          \ !== 'success') {\n  core.setFailed('Check failed, not ready to merge');\n\
          \  return;\n}\ncore.info('Check succeeded, ready to merge');\n"
